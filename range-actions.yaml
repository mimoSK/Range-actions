blueprint:
  name: Range Actions (1.0)
  description: |
    # Range Actions  
    **Version: 1.0**

    Source: https://github.com/mimoSK/Range-actions
    
    Range Actions is a Home Assistant automation blueprint for
    value-band based automations.

    It monitors one numeric entity and runs actions when the value enters a
    configured range, making it useful for notifications, staged control logic,
    and threshold-driven automations.

    **What This Blueprint Does:**
    - Watches a `sensor`, `input_number`, or `number` entity.
    - Evaluates configured ranges in order (first matching range wins).
    - Triggers only when entering a different range.
    - Supports optional additional conditions before actions run.
    - Exposes range and value context as template variables for actions.

    **Inputs:**
    - **Numeric Entity**: The sensor or number entity whose state is monitored.
    - **Monitored Ranges**: Ordered range definitions with name, optional description, minimum, and maximum values.
    - **Additional Conditions (Optional)**: Extra conditions that must pass before actions run.
    - **On Range Entered**: Actions executed when a new range is entered.

    **How Range Matching Works:**
    - Ranges are inclusive (`min <= value <= max`).
    - Overlapping ranges are allowed, but order determines the active range.
    - Invalid range bounds are skipped during evaluation.

    <details>
    <summary><b>Automation Process</b></summary>

    - On every state change of the monitored entity:
      - Previous and current values are parsed.
      - Previous range and current range are resolved.
      - Entry is detected when current range and differs from previous.

    - Actions run only when:
      - Current value is numeric,
      - A new range was entered,
      - Additional conditions (if provided) are satisfied.
    </details>

  domain: automation
  input:
    numeric_entity:
      name: Numeric Entity
      description: The sensor or number entity whose state should be monitored.
      selector:
        entity:
          filter:
            - domain: sensor
            - domain: input_number
            - domain: number
    ranges:
      name: Monitored Ranges
      description: >-
        Ordered list of ranges to monitor. The first matching range is
        treated as the active range, so overlapping ranges should be avoided or
        intentionally ordered.
      selector:
        object:
          label_field: name
          description_field: description
          multiple: true
          fields:
            name:
              label: Range Name
              description: Friendly name used in templates and notifications when this range is entered.
              required: true
              selector:
                text: {}
            description:
              label: Description
              description: Optional details about the range purpose. Exposed as template variable when entered.
              required: false
              selector:
                text: {}
            min:
              label: Minimum Value
              description: Inclusive lower bound for this range.
              required: true
              selector:
                number:
                  min: -1000000000
                  max: 1000000000
                  step: any
                  mode: box
            max:
              label: Maximum Value
              description: Inclusive upper bound for this range.
              required: true
              selector:
                number:
                  min: -1000000000
                  max: 1000000000
                  step: any
                  mode: box
    additional_conditions:
      name: Additional Conditions
      description: Optional extra conditions that must pass before the entry actions run.
      default: []
      selector:
        condition: {}
    entered_range_actions:
      name: On Range Entered
      description: 
        "Actions to run when the monitored entity enters a configured range.\n
        Available variables:\n
        {{ monitored_entity }} - Entity ID of the monitored entity\n
        {{ previous_value }} - Previous numeric value of the monitored entity (or null if unavailable)\n
        {{ current_value }} - Current numeric value of the monitored entity (or null if unavailable)\n
        {{ previous_range_index }} - Index of the previously active range (or -1 if none)\n
        {{ current_range_index }} - Index of the currently active range (or -1 if none)\n
        {{ entered_range_index }} - Index of the newly entered range (or -1 if none)\n
        {{ entered_range_name }} - Name of the newly entered range\n
        {{ entered_range_description }} - Description of the newly entered range\n
        {{ entered_range_min }} - Minimum value of the newly entered range\n
        {{ entered_range_max }} - Maximum value of the newly entered range\n
        {{ range_was_entered }} - Boolean indicating if a new range was entered"
      default: []
      selector:
        action: {}

variables:
  monitored_entity: !input numeric_entity
  configured_ranges: !input ranges
  previous_value: >-
    {% if trigger.from_state is not none %}
      {{ trigger.from_state.state | float(none) }}
    {% else %}
      {{ none }}
    {% endif %}
  current_value: >-
    {% if trigger.to_state is not none %}
      {{ trigger.to_state.state | float(none) }}
    {% else %}
      {{ none }}
    {% endif %}
  previous_range_index: >-
    {% set value = trigger.from_state.state | float(none) if trigger.from_state is not none else none %}
    {% set ns = namespace(index=-1) %}
    {% if value is number %}
      {% for item in configured_ranges %}
        {% set range_min = item.min | float(none) %}
        {% set range_max = item.max | float(none) %}
        {% set is_first_match = ns.index == -1 %}
        {% set has_valid_bounds = range_min is number and range_max is number and range_min <= range_max %}
        {% set is_in_range = value >= range_min and value <= range_max if has_valid_bounds else false %}
        {% if is_first_match and has_valid_bounds and is_in_range %}
          {% set ns.index = loop.index0 %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.index }}
  entered_range_index: >-
    {% set value = trigger.to_state.state | float(none) if trigger.to_state is not none else none %}
    {% set ns = namespace(index=-1) %}
    {% if value is number %}
      {% for item in configured_ranges %}
        {% set range_min = item.min | float(none) %}
        {% set range_max = item.max | float(none) %}
        {% set is_first_match = ns.index == -1 %}
        {% set has_valid_bounds = range_min is number and range_max is number and range_min <= range_max %}
        {% set is_in_range = value >= range_min and value <= range_max if has_valid_bounds else false %}
        {% if is_first_match and has_valid_bounds and is_in_range %}
          {% set ns.index = loop.index0 %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.index }}
  current_range_index: "{{ entered_range_index | int(-1) }}"
  range_was_entered: >-
    {{ entered_range_index | int(-1) >= 0 and entered_range_index | int(-1) != previous_range_index | int(-1) }}
  entered_range_name: >-
    {% set idx = entered_range_index | int(-1) %}
    {% if idx >= 0 and idx < (configured_ranges | count) %}
      {{ configured_ranges[idx].name }}
    {% else %}
      {{ '' }}
    {% endif %}
  entered_range_description: >-
    {% set idx = entered_range_index | int(-1) %}
    {% if idx >= 0 and idx < (configured_ranges | count) %}
      {{ configured_ranges[idx].description | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  entered_range_min: >-
    {% set idx = entered_range_index | int(-1) %}
    {% if idx >= 0 and idx < (configured_ranges | count) %}
      {{ configured_ranges[idx].min }}
    {% else %}
      {{ none }}
    {% endif %}
  entered_range_max: >-
    {% set idx = entered_range_index | int(-1) %}
    {% if idx >= 0 and idx < (configured_ranges | count) %}
      {{ configured_ranges[idx].max }}
    {% else %}
      {{ none }}
    {% endif %}

trigger:
  - platform: state
    entity_id: !input numeric_entity

condition:
  - condition: template
    value_template: "{{ current_value is number }}"
  - condition: template
    value_template: "{{ range_was_entered }}"
  - condition: and
    conditions: !input additional_conditions

action: !input entered_range_actions

mode: queued
